version: 1
project:
  title: Hongyu Zhang
  description: Personal website of Hongyu Zhang
  thumbnail: images/globe_logo.png
  # authors:
  #   - name: Hongyu Zhang
  copyright: '2026'
  keywords:
    - Data ethics
    - GIScience
    - GeoAI
  # github: hzhangic
  exclude:
    - _build
    - Thumbs.db
    - .DS_Store
    - '**.ipynb_checkpoints'
    - cv.typ
    - cv.pdf
    - generate_cv.py
    - generate_rss.py
    - inject_comments.py
    - rss.xml
    - atom.xml
    - fonts/**
    - CONDUCT.md
    - CONTRIBUTING.md
    - README.md
  toc:
    - file: index.md
    - file: pages/about.md
    - file: pages/publications.md
    - file: pages/grants.md
    - file: pages/teaching.md
    - file: pages/talks.md
    - file: pages/awards.md
    - file: pages/services.md
    - file: pages/news.md
    - file: pages/blog.md
    - pattern: blog/*.md
      hidden: true
site:
  options:
    logo: globe_logo.png
    logo_dark: globe_logo.png
    favicon: globe_logo.png
    style: custom.css
    # analytics_google: G-XXXXXXXXXX
    folders: true
  actions:
